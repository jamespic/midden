<!DOCTYPE html>
<html>
<head>
    <title>Heap Dump Explorer</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Heap Dump Explorer</h1>

    <h2>Existing Dumps</h2>
    {% if dump_names %}
        <ul>
        {% for name in dump_names %}
            <li>
                <a href="{{ url_for('explore_dump', dump_name=name) }}">{{ name }}</a>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No dumps loaded yet.</p>
    {% endif %}

    <h2>Upload New Heap Dump</h2>
    <form action="{{ url_for('upload_dump') }}" method="post" enctype="multipart/form-data">
        <label for="dump_name">Dump Name:</label>
        <input type="text" id="dump_name" name="dump_name" required>

        <label for="dump_file">Heap Dump File (.jsonl):</label>
        <input type="file" id="dump_file" name="dump_file" accept=".jsonl" required>

        <input type="submit" value="Upload">
    </form>
</body>
</html>
