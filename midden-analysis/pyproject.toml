[build-system]
requires = ["maturin>=1.13,<2.0"]
build-backend = "maturin"

[project]
name = "midden-analysis"
requires-python = ">=3.10"
readme = "README.md"
license = "MIT"
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
]
dynamic = ["version"]
dependencies = [
    "ruff>=0.15.12",
    "ty>=0.0.34",
]

[dependency-groups]
dev = ["maturin-import-hook>=0.3.0", "pytest>=8.3.5"]

[tool.maturin.generate-ci.github]
pytest = true
trusted_publishing = true
publishing_environment = "release"

# We're going to use this CI config as a starting point to customise, so don't bother with 32-bit or esoteric platforms that need special cases.
[tool.maturin.generate-ci.github.linux]
targets = ["x86_64", "aarch64"]

[tool.maturin.generate-ci.github.musllinux]
targets = ["x86_64", "aarch64"]

[tool.maturin.generate-ci.github.windows]

[tool.maturin.generate-ci.github.macos]
